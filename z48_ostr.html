<!DOCTYPE html>
<head>
<title>Sprawdzenie danych Ostrowska </title>
<meta charset="utf-8">
</head>
<body>
<div style="color:red;font-size:50px;">
<script language="JavaScript">
do {
var liczba1=prompt("wysokość=","");
var h_ostr=parseFloat(liczba1);
}
while ( h_ostr<=0);
do {
var liczba1=prompt("podstawę=","");
var a_ostr=parseFloat(liczba1);
}
while(!( a_ostr>0));
var Pole=a_ostr*h_ostr/2;
document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>");
</script>
</div>
</body>
</html>
